<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title> Тетяно, з Днем народження!</title>

<!-- Open Graph -->
<meta property="og:title" content="🎁 Вітаємо з Днем народження!" />
<meta property="og:description" content="Натисніть на зображення — вас чекає привітання 🎈" />
<meta property="og:image" content="https://dariatkachenko-prog.github.io/s.dnem.narodzhennia.Tetiano/preview.jpg" />
<meta property="og:image:type" content="image/jpeg" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta property="og:url" content="https://dariatkachenko-prog.github.io/s.dnem.narodzhennia.Tetiano/" />
<meta property="og:type" content="website" />
<meta property="og:site_name" content="Вітальна листівка" />

<!-- Twitter -->
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="🎁 Вітаємо з Днем народження!" />
<meta name="twitter:description" content="Натисніть на зображення — вас чекає привітання 🎈" />
<meta name="twitter:image" content="https://dariatkachenko-prog.github.io/s.dnem.narodzhennia.Tetiano/preview.jpg" />

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">

  <!-- External styles -->
  <link rel="stylesheet" href="style.css">

  <style>
:root {
  --main-font: 'Bad Script', cursive;
  --deep-violet: #2E003E;
}

    body {
      margin: 0;
      padding: 0;
      font-family: var(--main-font);
      color: var(--deep-violet);
    }

    .h1-line,
    .click-text,
    .congrats-text p {
      font-family: var(--main-font);
    }

    .hidden {
      visibility: hidden;
      opacity: 0;
    }

    @media screen and (max-width: 768px) {
      h1 { font-size: 1.8rem; }
      .click-text { font-size: 1rem; }
    }
  </style>
</head>

<body>
  <!-- Canvas для конфеті -->
  <canvas id="confetti-canvas" aria-hidden="true"></canvas>

  <div class="card">
    <h1>
      <span class="h1-line line1">ТЕТЯНО 🎉</span>
      <span class="h1-line line2">УСЯ КОМАНДА «НАША БУХГАЛТЕРІЯ» <br> ВІТАЄ ВАС З ДНЕМ НАРОДЖЕННЯ!</span>
    </h1>

    <div class="emoji-container" id="emoji-wrapper" aria-label="Натисни на кульку, щоб побачити привітання">
      <!-- Показуємо кульку; якщо зображення відсутнє, падаємо назад на старий smiley.png -->
      <img src="balloon.png" onerror="this.onerror=null;this.src='smiley.png';" alt="Кулька" id="smiley" class="floating" role="button" aria-label="Кулька — натисни" tabindex="0" />
      <span class="click-text">Натисніть тут 👇</span>
    </div>

    <div class="congrats-wrapper hidden" aria-live="polite">
      <div class="congrats-text">
        <div class="congrats-text-inner">
          <p>
            <span class="line">Хай у житті буде більше сміху,</span><br />
            <span class="line">Нових ідей, що заряджають енергією,</span><br />
            <span class="line">Справ, які приносять задоволення,</span><br />
            <span class="line">Та щоденних приводів для щирої усмішки!</span><br /><br />
            <span class="line signature">З найкращими побажаннями! ✨
</span>
          </p>
        </div>
      </div>
      <div class="congrats-photo">
        <img src="congrats-image.png" alt="Привітальне фото" />
      </div>
    </div>
  </div>

  <audio id="bg-music" src="music.mp3" loop></audio>
  <audio id="open-sound" src="open.mp3"></audio>

  <script src="script.js"></script>
</body>
</html>
